name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build ticket-grabber for Windows
        run: |
          cd ticket-grabber
          dotnet publish -r win-x64 --self-contained true -p:PublishSingleFile=true -c Release
          copy bin\Release\net9.0\win-x64\publish\ticket-grabber.exe ..\ticket-grabber.exe
          cd ..

      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtmultimedia'

      - name: Configure and Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Deploy Qt dependencies
        run: |
          mkdir deploy
          copy build\Release\SLS-TG.exe deploy\
          windeployqt --release --multimedia deploy\SLS-TG.exe
          copy BGM.wav deploy\
          copy Click.mp3 deploy\
          copy Hover.mp3 deploy\
          copy ticket.mp3 deploy\
          copy Happy.mp3 deploy\
          copy Sad.mp3 deploy\
          copy L0.png deploy\
          copy L1.png deploy\
          copy L2.png deploy\
          copy L3.png deploy\
          copy Bg.png deploy\
          copy Icon.png deploy\
          copy ticket-grabber.exe deploy\

      - name: Package as ZIP
        run: |
          Compress-Archive -Path deploy\* -DestinationPath SLS-TG-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SLS-TG-Windows
          path: SLS-TG-Windows.zip
